name: Check

on:
  push:
  pull_request:

jobs:
  syntax:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Check JavaScript syntax
        run: npm run check
